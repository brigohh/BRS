<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRS — Reviewer Resource</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;color:#111827;background:#f0f2f5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.nav{background:#1a3a6b;height:48px;display:flex;align-items:center;padding:0 24px;flex-shrink:0;overflow:hidden}
.nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.nav-brand{color:rgba(255,255,255,.9);font-size:11.5px;font-weight:600;white-space:nowrap;letter-spacing:.5px}
.nav-links{display:flex;align-items:center;margin-left:auto;flex-wrap:nowrap}
.nl{color:rgba(255,255,255,.55);font-size:10.5px;padding:0 8px;cursor:pointer;font-weight:500;height:48px;display:flex;align-items:center;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.nl:hover{color:#fff}
.nl.on{color:#fff;border-bottom-color:rgba(255,255,255,.7);font-weight:600}
.nav-av{width:30px;height:30px;border-radius:50%;background:#2d5aa0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}

.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:14px 12px 10px}
.sidebar-top-label{font-size:9.5px;font-weight:700;letter-spacing:.6px;color:#9ca3af;text-transform:uppercase;margin-bottom:8px}
.sidebar-search{position:relative}
.sidebar-search i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:13px;pointer-events:none}
.sidebar-search input{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:7px 10px 7px 30px;font-size:11.5px;color:#374151;outline:none;background:#f9fafb}
.sidebar-search input:focus{border-color:#1a3a6b;background:#fff}
.sidebar-divider{height:1px;background:#f3f4f6}
.sidebar-tabs{flex:1;overflow-y:auto;padding:6px 0 12px}
.tab{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;font-size:11.5px;font-weight:500;color:#6b7280;transition:background .1s}
.tab:hover{background:#f9fafb;color:#374151}
.tab.on{background:#eef2ff;color:#1a3a6b;font-weight:600}
.tab-count{font-size:9.5px;font-weight:700;background:#f3f4f6;color:#9ca3af;padding:1px 6px;border-radius:10px;min-width:22px;text-align:center}
.tab.on .tab-count{background:#c7d2fe;color:#3730a3}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.main-header{padding:14px 48px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#f0f2f5;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10}
.main-header-left{display:flex;align-items:baseline;gap:10px}
.main-title{font-size:14px;font-weight:700;color:#111827}
.main-count{font-size:11px;color:#9ca3af;font-weight:500}
.submit-btn{display:flex;align-items:center;gap:6px;background:#1a3a6b;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:11.5px;font-weight:600;cursor:pointer;letter-spacing:.2px}
.submit-btn:hover{background:#15306b}
.cards-area{padding:20px 48px 32px;flex:1}
.cards-grid{columns:2;column-gap:14px}

/* CARDS */
.comment-card{background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:16px;margin-bottom:14px;break-inside:avoid;transition:box-shadow .15s,border-color .15s}
.comment-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07);border-color:#d1d5db}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:6px}
.card-top-left{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pt-pill{font-size:9px;font-weight:700;background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.2px;text-transform:uppercase}
.ct-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.2px}
.ct-CC{background:#dcfce7;color:#166534}
.ct-IC{background:#fee2e2;color:#991b1b}
.ct-CNC{background:#f3f4f6;color:#374151}
.ct-INC{background:#fce7f3;color:#9d174d}
.ct-PIL{background:#fef9c3;color:#854d0e}
.ct-Unknown{background:#f3f4f6;color:#9ca3af}
.card-body{font-size:12px;line-height:1.65;color:#4b5563;margin-bottom:12px}
.card-body strong{background:#fce7f3;padding:1px 4px;border-radius:3px;font-weight:600;color:#374151}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid #f3f4f6}
.copy-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;padding:2px 0}
.copy-btn:hover{color:#374151}
.copy-btn.copied{color:#16a34a}
.card-source{font-size:9.5px;color:#e5e7eb;font-weight:500;letter-spacing:.2px;text-transform:uppercase}
.card-source.submitted{color:#9ca3af}
.delete-btn{background:none;border:none;color:#e5e7eb;cursor:pointer;font-size:11px;padding:2px 4px;margin-left:2px}
.delete-btn:hover{color:#ef4444}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px;color:#9ca3af}
.empty-state i{font-size:36px;margin-bottom:12px;display:block;color:#d1d5db}
.empty-state p{font-size:13px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:680px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.15);display:flex;flex-direction:column}
.modal-header{padding:20px 22px 16px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:14px;font-weight:700;color:#111827}
.modal-close{background:none;border:none;color:#9ca3af;cursor:pointer;font-size:18px;line-height:1;padding:2px;border-radius:4px}
.modal-close:hover{color:#374151;background:#f3f4f6}
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.modal-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.modal-textarea{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;font-size:12.5px;line-height:1.6;resize:vertical;min-height:100px;font-family:inherit;color:#374151;outline:none;background:#fafafa}
.modal-textarea:focus{border-color:#1a3a6b;background:#fff}
.preview-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px;font-size:12px;line-height:1.65;color:#374151;min-height:60px;display:none}
.preview-box.visible{display:block}
.preview-box mark{background:#fef9c3;border-radius:2px;padding:0 2px}
.modal-row{display:flex;gap:12px}
.modal-field{flex:1;display:flex;flex-direction:column}
.modal-select{border:1px solid #e5e7eb;border-radius:8px;padding:8px 10px;font-size:12px;color:#374151;background:#fff;outline:none;cursor:pointer;width:100%}
.modal-select:focus{border-color:#1a3a6b}
.modal-footer{padding:14px 22px 20px;border-top:1px solid #f3f4f6;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.modal-cancel{background:none;border:1px solid #e5e7eb;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer}
.modal-cancel:hover{background:#f9fafb}
.modal-submit{background:#1a3a6b;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer}
.modal-submit:hover{background:#15306b}
.modal-submit:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo" onclick="location='hub.html'">
    <img src="nba-logo.svg" style="width:16px;height:auto">
    <div class="nav-brand">BRIDGET REVIEW SYSTEM 1.0</div>
  </div>
  <div class="nav-links">
    <span class="nl" onclick="location='hub.html'">HOME</span>
    <span class="nl" onclick="location='sc-hub.html'">PUBLISHED GAMES</span>
    <span class="nl">RIM</span>
    <span class="nl">RM REVIEW</span>
    <span class="nl">FINAL L2M REVIEW</span>
    <span class="nl">INDEPENDENT REVIEW</span>
    <span class="nl">ADMINISTRATION</span>
    <span class="nl on">REVIEWER RESOURCE</span>
    <span class="nl">MY SCHEDULE</span>
    <div class="nav-av" style="margin-left:12px">BN</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-top-label">Filter</div>
      <div class="sidebar-search">
        <i class="ti ti-search"></i>
        <input type="text" id="search-input" placeholder="Search comments..." oninput="onSearch()">
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-tabs" id="tabs"></div>
  </div>

  <div class="main">
    <div class="main-header">
      <div class="main-header-left">
        <div class="main-title">Comment Library</div>
        <div class="main-count" id="main-count"></div>
      </div>
      <button class="submit-btn" onclick="openModal()"><i class="ti ti-plus"></i> Submit a Comment</button>
    </div>
    <div class="cards-area">
      <div class="cards-grid" id="cards-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <i class="ti ti-search"></i>
        <p>No comments match your search.</p>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Submit a Comment</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-label">Raw Comment</div>
        <textarea class="modal-textarea" id="modal-textarea" placeholder="Paste or type your comment here..." oninput="onTextareaInput()"></textarea>
      </div>
      <div>
        <div class="modal-label">Preview — after redaction</div>
        <div class="preview-box" id="preview-box"></div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <div class="modal-label">Play Type</div>
          <select class="modal-select" id="modal-pt">
            <option value="Foul: Shooting">Foul: Shooting</option>
            <option value="Foul: Offensive">Foul: Offensive</option>
            <option value="Foul: Loose Ball">Foul: Loose Ball</option>
            <option value="Foul: Personal">Foul: Personal</option>
            <option value="Out of Bounds">Out of Bounds</option>
            <option value="Travel">Travel</option>
            <option value="Goaltending">Goaltending</option>
            <option value="Uncategorized">Uncategorized</option>
          </select>
        </div>
        <div class="modal-field">
          <div class="modal-label">Call Type</div>
          <select class="modal-select" id="modal-ct">
            <option value="CC">CC — Correct Call</option>
            <option value="IC">IC — Incorrect Call</option>
            <option value="CNC">CNC — Correct No Call</option>
            <option value="INC">INC — Incorrect No Call</option>
            <option value="PIL">PIL — Potential Infraction (lean No)</option>
            <option value="Unknown">Unknown</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-submit" id="modal-submit" onclick="submitComment()" disabled>Submit</button>
    </div>
  </div>
</div>

// ── Detection ─────────────────────────────────────────────────────────────

function detectPlayType(text) {
  const t = text.toLowerCase();
  const scores = {'Foul: Shooting':0,'Foul: Offensive':0,'Foul: Loose Ball':0,'Foul: Personal':0,'Out of Bounds':0,'Travel':0,'Goaltending':0};
  const kw = {
    'Foul: Shooting': ['shooting motion','shot attempt','upward shooting','jump shot','contesting','contests the','release of','releases the','in control of the ball','shot release','upward motion','elevates'],
    'Foul: Offensive': ['screen','pick','screening position','set the pick','sets a screen','setting the pick'],
    'Foul: Loose Ball': ['rebound','loose ball','pursue the rebound','pursues the rebound'],
    'Foul: Personal': ['sqbr','drive to the basket','drives toward','personal foul','hand-on-ball','during the drive','during his drive'],
    'Out of Bounds': ['out of bounds','goes out of bounds','last to touch','possession should','possession is awarded'],
    'Travel': ['pivot foot','gathers the ball','gather the ball','travel','step-back','pivot'],
    'Goaltending': ['goaltending','blocks the shot','blocked shot'],
  };
  for (const [type, words] of Object.entries(kw)) {
    for (const w of words) { if (t.includes(w)) scores[type]++; }
  }
  const best = Object.entries(scores).sort((a,b) => b[1]-a[1])[0];
  return best[1] > 0 ? best[0] : 'Uncategorized';
}

function detectCallType(text) {
  const t = text.toLowerCase();
  if (t.includes('there is judgment') || t.includes('there is judgement')) return 'PIL';
  if (t.includes('play should have continued without a whistle') || t.includes('play correctly continues') || t.includes('no violation on the play') || t.includes('is not a violation')) return 'CNC';
  if (t.includes('should have been assessed') || t.includes('should have been called') || t.includes('incorrectly')) return 'IC';
  if (t.includes('a foul should be assessed') || t.includes('foul should be assessed')) return 'INC';
  if (t.includes('correctly called') || t.includes('correctly assessed') || t.includes('is correctly')) return 'CC';
  return 'Unknown';
}

// Auto-highlight the most physically specific clause in a comment
function detectKeyPhrase(text) {
  if (/\*\*/.test(text)) return text; // already marked
  const actionWords = [
    'applies','places a hand','places their hand','places his hand','extends his','extends their','extends an arm',
    'wraps his','wraps their','wraps an arm','reaches in','grabs','pulls','hooks','leans into',
    'moves underneath','walks underneath','dislodges','initiates contact','makes contact to',
    'momentarily','briefly places','firms up','maintains verticality','delivers contact',
    'steps into','step backwards','lifts his','clasps','swipes down','does not establish',
    'beats.*to the spot','reaches across','places his forearm','places their forearm'
  ];
  // Split into clauses on ", " or "; " or " and " or " before " or " but "
  const sentences = text.split(/(?<=\.)\s+(?=[A-Z])/);
  let bestClause = null, bestScore = -1;
  for (const sent of sentences) {
    const parts = sent.split(/,\s*(?=[a-z])/);
    for (const part of parts) {
      const p = part.trim();
      if (p.length < 25 || p.length > 180) continue;
      let score = 0;
      const pl = p.toLowerCase();
      for (const w of actionWords) { if (new RegExp(w).test(pl)) score += 2; }
      if (/\b(arm|forearm|hand|elbow|shoulder|leg|foot|wrist|back|side|waist|body)\b/.test(pl)) score++;
      // Downgrade legal/conclusion language
      if (/play should|a foul should|correctly|although|however|there is judg|there is no/.test(pl)) score -= 2;
      if (score > bestScore) { bestScore = score; bestClause = p; }
    }
  }
  if (!bestClause || bestScore < 1) return text;
  // Escape special regex chars
  const esc = bestClause.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(esc), `**${bestClause}**`);
}

// Redact player names → [Player]
function plainRedact(text) {
  let r = text;
  r = r.replace(/#\d+\s+[A-Z][A-Za-zÀ-ž'-]+(?:\s+[A-Z][A-Za-zÀ-ž'-]+)?\s+\([A-Z]{2,4}\)/g, '[Player]');
  r = r.replace(/\b([A-Z][A-Za-zÀ-ž'-]+(?:\s+(?:Jr\.|II|III|IV))?)(?:'s)?\s+\([A-Z]{2,4}\)/g, '[Player]');
  return r;
}

function redactForPreview(text) {
  let r = text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  r = r.replace(/#\d+\s+[A-Z][A-Za-zÀ-ž'-]+(?:\s+[A-Z][A-Za-zÀ-ž'-]+)?\s+\([A-Z]{2,4}\)/g, '<mark>[Player]</mark>');
  r = r.replace(/\b([A-Z][A-Za-zÀ-ž'-]+(?:\s+(?:Jr\.|II|III|IV))?)(?:'s)?\s+\([A-Z]{2,4}\)/g, '<mark>[Player]</mark>');
  return r;
}

function renderBold(text) {
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

// ── Storage ───────────────────────────────────────────────────────────────

function loadComments() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) { try { return JSON.parse(stored); } catch(e) {} }
  const seeded = SEED_COMMENTS.map((raw, i) => {
    const redacted = plainRedact(raw);
    const withKey = detectKeyPhrase(redacted);
    return {
      id: 'seed_' + i,
      text: withKey,
      playType: detectPlayType(redacted),
      callType: detectCallType(redacted),
      source: 'seed'
    };
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
  return seeded;
}

function saveComments() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(allComments));
}

// ── State ─────────────────────────────────────────────────────────────────

let allComments = loadComments();
let activeTab = 'All';
let searchQuery = '';

// ── Render ────────────────────────────────────────────────────────────────

function filteredComments() {
  return allComments.filter(c => {
    const matchTab = activeTab === 'All' || c.playType === activeTab;
    const matchSearch = !searchQuery || c.text.toLowerCase().includes(searchQuery.toLowerCase());
    return matchTab && matchSearch;
  });
}

function countForTab(tab) {
  return allComments.filter(c => tab === 'All' || c.playType === tab).length;
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = PLAY_TYPES.map(pt => `
    <div class="tab${activeTab === pt ? ' on' : ''}" onclick="setTab('${pt.replace(/'/g,"\\'")}')">
      <span>${pt}</span>
      <span class="tab-count">${countForTab(pt)}</span>
    </div>`).join('');
}

function ctBadge(ct) {
  const labels = {CC:'CC',IC:'IC',CNC:'CNC',INC:'INC',PIL:'PIL',Unknown:'—'};
  return `<span class="ct-badge ct-${ct}">${labels[ct]||ct}</span>`;
}

function renderCard(c) {
  const bodyHtml = renderBold(c.text.replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  const deleteBtn = c.source === 'submitted'
    ? `<button class="delete-btn" onclick="deleteComment('${c.id}')" title="Delete"><i class="ti ti-x"></i></button>`
    : '';
  return `<div class="comment-card" id="card-${c.id}">
    <div class="card-top">
      <div class="card-top-left">
        <span class="pt-pill">${c.playType}</span>
        ${ctBadge(c.callType)}
      </div>
    </div>
    <div class="card-body">${bodyHtml}</div>
    <div class="card-footer">
      <button class="copy-btn" id="copy-${c.id}" onclick="copyComment('${c.id}')">
        <i class="ti ti-copy"></i> Copy
      </button>
      <div style="display:flex;align-items:center;gap:4px">
        <span class="card-source${c.source==='submitted'?' submitted':''}">${c.source==='submitted'?'Submitted':'Pre-loaded'}</span>
        ${deleteBtn}
      </div>
    </div>
  </div>`;
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');
  const fc = filteredComments();
  document.getElementById('main-count').textContent = fc.length + ' comment' + (fc.length!==1?'s':'');
  if (!fc.length) { grid.innerHTML=''; empty.style.display='block'; }
  else { empty.style.display='none'; grid.innerHTML=fc.map(renderCard).join(''); }
}

function render() { renderTabs(); renderCards(); }

// ── Actions ───────────────────────────────────────────────────────────────

function setTab(tab) { activeTab = tab; render(); }
function onSearch() { searchQuery = document.getElementById('search-input').value; renderCards(); }

function copyComment(id) {
  const c = allComments.find(x => x.id === id);
  if (!c) return;
  const plain = c.text.replace(/\*\*(.+?)\*\*/g,'$1');
  navigator.clipboard.writeText(plain).then(() => {
    const btn = document.getElementById('copy-'+id);
    btn.classList.add('copied');
    btn.innerHTML = '<i class="ti ti-check"></i> Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML='<i class="ti ti-copy"></i> Copy'; }, 1500);
  });
}

function deleteComment(id) {
  allComments = allComments.filter(c => c.id !== id);
  saveComments(); render();
}

// ── Modal ─────────────────────────────────────────────────────────────────

let debounceTimer;

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-textarea').value = '';
  document.getElementById('preview-box').classList.remove('visible');
  document.getElementById('modal-submit').disabled = true;
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function onOverlayClick(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

function onTextareaInput() {
  const val = document.getElementById('modal-textarea').value.trim();
  document.getElementById('modal-submit').disabled = !val;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    if (!val) { document.getElementById('preview-box').classList.remove('visible'); return; }
    const preview = document.getElementById('preview-box');
    preview.innerHTML = redactForPreview(val);
    preview.classList.add('visible');
    const redacted = plainRedact(val);
    document.getElementById('modal-pt').value = detectPlayType(redacted);
    document.getElementById('modal-ct').value = detectCallType(redacted);
  }, 300);
}

function submitComment() {
  const raw = document.getElementById('modal-textarea').value.trim();
  if (!raw) return;
  const redacted = plainRedact(raw);
  const withKey = detectKeyPhrase(redacted);
  const comment = {
    id: 'user_' + Date.now(),
    text: withKey,
    playType: document.getElementById('modal-pt').value,
    callType: document.getElementById('modal-ct').value,
    source: 'submitted'
  };
  allComments.unshift(comment);
  saveComments(); closeModal(); render();
}

render();
</script>
