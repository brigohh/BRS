<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRS — RIM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;color:#111827;background:#f3f4f6;min-height:100vh}
.nav{background:#1a3a6b;height:48px;display:flex;align-items:center;padding:0 24px;flex-shrink:0;overflow:visible;position:relative;z-index:300}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-brand{color:rgba(255,255,255,.9);font-size:11.5px;font-weight:600;white-space:nowrap;letter-spacing:.5px}
.nav-links{display:flex;align-items:center;margin-left:auto;flex-shrink:0;flex-wrap:nowrap}
.nl{color:rgba(255,255,255,.55);font-size:10.5px;padding:0 8px;cursor:pointer;font-weight:500;height:48px;display:flex;align-items:center;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.nl:hover{color:#fff}
.nl.on{color:#fff;border-bottom-color:rgba(255,255,255,.7);font-weight:600}
.nav-av{width:30px;height:30px;border-radius:50%;background:#2d5aa0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.nav-dropdown{position:relative;display:flex;align-items:center;height:48px}
.nav-dropdown .nl{gap:4px}
.nav-dd-caret{font-size:8px;opacity:.7;transition:transform .15s}
.nav-dropdown.open .nav-dd-caret{transform:rotate(180deg)}
.nav-dd-menu{display:none;position:absolute;top:44px;right:0;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.14);min-width:170px;z-index:400;padding:4px 0}
.nav-dropdown.open .nav-dd-menu{display:block}
.nav-dd-item{display:block;padding:9px 16px;font-size:11px;font-weight:500;color:#374151;text-decoration:none;white-space:nowrap;cursor:pointer}
.nav-dd-item:hover{background:#f0f2f5;color:#1a3a6b}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo" onclick="location='home.html'" style="cursor:pointer">
    <img src="Logos/nba-logo.svg" style="width:16px;height:auto">
    <div class="nav-brand">BRIDGET REVIEW SYSTEM 1.0</div>
  </div>
  <div class="nav-links">
    <span class="nl" onclick="location='home.html'">HOME</span>
    <span class="nl" onclick="location='published-games.html'">PUBLISHED GAMES</span>
    <span class="nl on">RIM</span>
    <span class="nl">RM REVIEW</span>
    <span class="nl">FINAL L2M REVIEW</span>
    <span class="nl">INDEPENDENT REVIEW</span>
    <span class="nl">ADMINISTRATION</span>
    <div class="nav-dropdown" id="nav-dropdown">
      <span class="nl" onclick="toggleNavDropdown(event)">REVIEWER RESOURCE <span class="nav-dd-caret">▾</span></span>
      <div class="nav-dd-menu">
        <span class="nav-dd-item" onclick="location='comment-library.html'">Comment Library</span>
      </div>
    </div>
    <span class="nl">MY SCHEDULE</span>
    <div class="nav-av" style="margin-left:12px">BN</div>
  </div>
</div>

<script>
function toggleNavDropdown(e){e.stopPropagation();document.getElementById('nav-dropdown').classList.toggle('open')}
document.addEventListener('click',()=>document.getElementById('nav-dropdown').classList.remove('open'));
</script>
</body>
</html>
